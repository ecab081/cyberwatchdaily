name: Fix All Blog Posts
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix all blog posts
        run: |
          node - << 'EOF'
          const fs   = require('fs');
          const path = require('path');

          const BLOG_DIR    = path.join(process.cwd(), 'blog');
          const AUTHOR_NAME = 'E. Cab';
          const AUTHOR_TITLE = 'Cybersecurity Analyst';
          const AUTHOR_URL  = 'https://cyberwatchdaily.net/about.html';

          // ── New nav (no Podcast, About links to /about.html) ──────────────
          const NEW_NAV = `<nav>
            <a href="/">News</a>
            <a href="/blog/">Blog</a>
            <a href="/tools.html">Tools</a>
            <a href="/best-vpn-2026.html">VPN Guide</a>
            <a href="/#newsletter">Newsletter</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
          </nav>`;

          // ── Author byline HTML (inserted after .excerpt div) ───────────────
          const byline = `<div class="author-byline" style="display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;background:#161e26;border:1px solid rgba(0,255,136,0.12);margin-bottom:1.5rem;">
            <div style="width:40px;height:40px;background:#003d1f;border:1px solid rgba(0,255,136,0.25);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:13px;font-weight:600;color:#00ff88;flex-shrink:0;">EC</div>
            <div>
              <div style="color:#e0edd6;font-weight:500;font-size:13px;"><a href="${AUTHOR_URL}" style="color:#e0edd6;text-decoration:none;">${AUTHOR_NAME}</a></div>
              <div style="color:#3d5a47;font-family:monospace;font-size:11px;margin-top:2px;">${AUTHOR_TITLE} · CyberWatch Daily</div>
            </div>
          </div>`;

          // ── Author bio box (inserted before .cta div) ───────────────────────
          const bioBox = `<div style="background:#0d1317;border:1px solid rgba(0,255,136,0.12);padding:1.5rem;margin:2.5rem 0;display:flex;gap:1.25rem;align-items:flex-start;">
            <div style="width:56px;height:56px;background:#003d1f;border:1px solid rgba(0,255,136,0.25);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:18px;font-weight:600;color:#00ff88;flex-shrink:0;">EC</div>
            <div>
              <div style="font-family:monospace;font-size:14px;font-weight:500;color:#e0edd6;margin-bottom:2px;"><a href="${AUTHOR_URL}" style="color:#e0edd6;text-decoration:none;">${AUTHOR_NAME}</a></div>
              <div style="font-family:monospace;font-size:11px;color:#00ff88;margin-bottom:8px;">${AUTHOR_TITLE}, CyberWatch Daily</div>
              <p style="color:#7a9e8a;font-size:13px;line-height:1.7;margin:0;">Cybersecurity professional with hands-on experience in defensive operations, threat intelligence, and incident response. Covers ransomware, phishing, nation-state threats, and practical security guidance for individuals and organizations.</p>
            </div>
          </div>`;

          // ── Schema fix: replace Organization author with Person ────────────
          function fixSchema(html) {
            return html.replace(
              /"author"\s*:\s*\{\s*"@type"\s*:\s*"Organization"[\s\S]*?\}/,
              `"author": { "@type": "Person", "name": "${AUTHOR_NAME}", "jobTitle": "${AUTHOR_TITLE}", "url": "${AUTHOR_URL}" }`
            );
          }

          // ── Process each blog post ──────────────────────────────────────────────────────────────
          const files = fs.readdirSync(BLOG_DIR)
            .filter(f => f.endsWith('.html') && f !== 'index.html');

          let fixed = 0;
          for (const file of files) {
            const fp  = path.join(BLOG_DIR, file);
            let html  = fs.readFileSync(fp, 'utf8');
            const orig = html;

            // 1. Fix nav — replace old nav block
            html = html.replace(
              /<nav>[\s\S]*?<\/nav>/,
              NEW_NAV
            );

            // 2. Remove standalone Podcast nav link if still present
            html = html.replace(/<a href="\/podcast\.html"[^>]*>Podcast<\/a>/g, '');

            // 3. Fix schema author type
            html = fixSchema(html);

            // 4. Add author byline after .excerpt div (if not already present)
            if (!html.includes('author-byline') && html.includes('class="excerpt"')) {
              html = html.replace(
                /(<div class="excerpt">[\s\S]*?<\/div>)/,
                '$1\n' + byline
              );
            }

            // 5. Add author bio box before .cta div (if not already present)
            if (!html.includes('EC</div>') && html.includes('class="cta"')) {
              html = html.replace(
                '<div class="cta">',
                bioBox + '\n<div class="cta">'
              );
            }

            if (html !== orig) {
              fs.writeFileSync(fp, html);
              fixed++;
              console.log('Fixed: ' + file);
            } else {
              console.log('Skipped (no changes): ' + file);
            }
          }
          console.log('\nDone. Fixed ' + fixed + ' of ' + files.length + ' posts.');
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog/
          git commit -m "Fix all posts: remove Podcast nav, add E. Cab author byline, fix schema" || echo "Nothing to commit"
          git push
