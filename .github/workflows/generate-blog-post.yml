name: Generate Blog Post

on:
  schedule:
    - cron: '0 14 * * 1'
    - cron: '0 14 * * 3'
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install node-fetch
      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.js
      - name: Commit and push
        run: |
          git config --global user.name "CyberWatch Bot"
          git config --global user.email "bot@cyberwatchdaily.net"
          git add blog/ sitemap.xml
          git diff --staged --quiet || git commit -m "Auto: New blog post $(date +'%Y-%m-%d')"
          git push
